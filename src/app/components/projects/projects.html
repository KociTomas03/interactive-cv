<section class="max-w-4xl mx-auto px-6 py-16">
  <h2 class="text-2xl font-semibold tracking-tight text-slate-900 dark:text-slate-100 mb-10">
    Projects
  </h2>
  <div class="grid gap-4 md:grid-cols-2">
    @for (project of projects; track project.id) {
      <div appScrollReveal class="rounded-lg border p-6 flex flex-col gap-4 transition-colors
                  border-slate-200 bg-white
                  dark:border-slate-800 dark:bg-slate-900 dark:hover:border-slate-700">
        <div>
          <div class="flex items-start justify-between gap-2">
            <h3 class="font-semibold text-sm text-slate-900 dark:text-slate-100 leading-snug">
              {{ project.name }}
            </h3>
            @if (project.status === 'in-progress') {
              <span class="text-xs px-2 py-1 bg-amber-50 text-amber-700 rounded-full whitespace-nowrap
                           dark:bg-amber-900/20 dark:text-amber-400">
                In progress
              </span>
            }
          </div>
          <p class="mt-2 text-xs leading-relaxed text-slate-500 dark:text-slate-400">
            {{ project.description }}
          </p>
        </div>
        <div class="flex flex-wrap gap-2">
          @for (tech of project.stack; track tech) {
            <span class="text-xs px-2 py-1 rounded border
                         bg-slate-100 border-slate-200 text-slate-600
                         dark:bg-slate-900 dark:border-slate-700 dark:text-slate-400">
              {{ tech }}
            </span>
          }
        </div>
        <div class="flex flex-wrap gap-4 mt-auto">
          @if (project.repoUrl) {
            <a [href]="project.repoUrl" target="_blank" rel="noopener noreferrer"
               class="text-xs font-medium text-slate-600 hover:text-cyan-600
                      dark:text-slate-400 dark:hover:text-cyan-400 transition-colors">
              Source →
            </a>
          }
          @if (project.demoUrl) {
            <a [href]="project.demoUrl" target="_blank" rel="noopener noreferrer"
               class="text-xs font-medium text-slate-600 hover:text-cyan-600
                      dark:text-slate-400 dark:hover:text-cyan-400 transition-colors">
              Full thesis →
            </a>
          }
        </div>
      </div>
    }
  </div>
</section>
