<section id="projects" class="max-w-4xl mx-auto px-6 py-16">
  <h2 class="text-3xl font-bold text-slate-900 mb-10">Projects</h2>
  <div class="grid gap-6 md:grid-cols-2">
    @for (project of projects; track project.id) {
      <div class="border border-slate-200 rounded-lg p-6 flex flex-col gap-4">
        <div>
          <div class="flex items-start justify-between gap-2">
            <h3 class="font-semibold text-slate-900">{{ project.name }}</h3>
            @if (project.status === 'in-progress') {
              <span class="text-xs px-2 py-1 bg-amber-50 text-amber-700 rounded-full whitespace-nowrap">In progress</span>
            }
          </div>
          <p class="mt-2 text-sm text-slate-500">{{ project.description }}</p>
        </div>
        <div class="flex flex-wrap gap-2">
          @for (tech of project.stack; track tech) {
            <span class="text-xs px-2 py-1 bg-slate-100 rounded text-slate-600">{{ tech }}</span>
          }
        </div>
        <div class="flex flex-wrap gap-4 mt-auto">
          @if (project.repoUrl) {
            <a
              [href]="project.repoUrl"
              target="_blank"
              rel="noopener noreferrer"
              class="text-sm font-medium text-slate-700 hover:text-slate-900 underline underline-offset-4"
            >
              Source →
            </a>
          }
          @if (project.demoUrl) {
            <a
              [href]="project.demoUrl"
              target="_blank"
              rel="noopener noreferrer"
              class="text-sm font-medium text-slate-700 hover:text-slate-900 underline underline-offset-4"
            >
              Full thesis →
            </a>
          }
        </div>
      </div>
    }
  </div>
</section>
