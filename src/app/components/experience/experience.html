<section id="experience" class="max-w-4xl mx-auto px-6 py-16">
  <h2 class="text-3xl font-bold text-slate-900 mb-10">Experience</h2>
  <ul class="space-y-10">
    @for (entry of experiences; track entry.id) {
      <li class="border-l-2 border-slate-200 pl-6">
        <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-1">
          <div>
            <h3 class="text-lg font-semibold text-slate-900">{{ entry.role }}</h3>
            <p class="text-slate-600">{{ entry.company }}</p>
          </div>
          <span class="text-sm text-slate-400 whitespace-nowrap">
            {{ entry.period.from }} – {{ entry.period.to }}
          </span>
        </div>
        <p class="mt-3 text-slate-500">{{ entry.summary }}</p>
        <div class="mt-3 flex flex-wrap gap-2">
          @for (tech of entry.stack; track tech) {
            <span class="text-xs px-2 py-1 bg-slate-100 rounded text-slate-600">{{ tech }}</span>
          }
        </div>
      </li>
    }
  </ul>
</section>
